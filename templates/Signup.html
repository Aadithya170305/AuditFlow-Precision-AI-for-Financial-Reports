<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/signup.css">
    <title>Signup </title>
</head>
<body>
    <div class="login-container">
        <div class="hero-section">
            <div class="hero-content">
            </div>
    </div>
    <div class="form-section">
        <div class="login-card">
            <h2>Welcome Back!</h2>
            <p>Log in to start creating...</p>
            <form method="POST">
                <label>Email</label>
                <input type="email" name="email" placeholder="Input your email">
                <label>Password</label>
                <input type="password" name="password" placeholder="Input your password">
                <br>
                <button type="submit" class="btn-signup">Submit</button>
            </form>
            <br>
            <br>
            {% if error or success %}
            <div class="alert-container" id="alertBox">
                {% if error %}
                <div class="alert alert-danger text-center w-100" role="alert">{{ error }}</div>
                {% endif %}
                {% if success %}
                <div class="alert alert-success text-center w-100" role="alert">{{ success }}</div>
                {% endif %}
            </div>
            {% endif %}
        </div>
      </div>
    </div>
     <script>
        const alertBox = document.getElementById("alertBox");
        if (alertBox) {
            if (alertBox.innerText.includes("Success") ||  alertBox.innerText.includes("User already exists") || "{{ success }}" !== "") {
                setTimeout(() => {
                    window.location.href = "http://127.0.0.1:8000/login"; 
                }, 3000);
            } else {
                setTimeout(() => {
                    const alertBox = document.getElementById("alertBox");
                    if (alertBox) {
                        alertBox.style.display = "none";
                    }
                }, 5000);
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
