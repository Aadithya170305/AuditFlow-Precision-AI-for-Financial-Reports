<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>
<body>
    <div class="login-container">
        <div class="hero-section">
            <div class="hero-content"></div>
        </div>
        <div class="form-section">
            <div class="login-card">
                <h2>Welcome Back!</h2>
                <p>Log in to start creating...</p>
                <form method="POST" action="/login">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Input your email" required>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Input your password" required>
                    <button type="submit" class="btn-login">Login</button>
                    <div class="or-auth">Or continue with</div>
                    <button type="button" class="btn-google" onclick="window.location.href='/auth/login'">
                        <img src="/static/Google__G__logo.svg.png" alt="Google" width="18">
                        Continue with Google
                    </button>
                </form>
                <br>
                <p>Don't Have an Account?  
                    <a href="http://127.0.0.1:8000/signup">Proceed Here</a>
                </p>
                <br>
                <div class="alert-container">
                    {% if error %}
                    <div class="alert alert-danger text-center w-100" id="alertBox" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}
                    {% if success %}
                    <div class="alert alert-success text-center w-100" id="alertBox" role="alert">
                        {{ success }}
                    </div>
                    <script>
                        setTimeout(() => {
                            window.location.href = "/chat";
                        }, 5000);
                    </script>
                    {% endif %}
                </div>
                <script>
                    setTimeout(() => {
                        const alertBox = document.getElementById("alertBox");
                        if (alertBox) {
                            alertBox.style.display = "none";
                        }
                    }, 5000);
                </script>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
